name: stepify
description: Step-by-step cooking app with dependency graph and timers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  get_it: ^8.0.3

  # Navigation
  go_router: ^15.1.2

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.3

flutter:
  uses-material-design: true

  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
